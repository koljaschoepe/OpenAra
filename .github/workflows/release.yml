name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest tests/ -v --tb=short --cov=arasul_tui --cov-report=term-missing --cov-fail-under=65

  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czf openara-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='tests' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            --exclude='.coverage' \
            --exclude='*.egg-info' \
            .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: openara-*.tar.gz
          body: |
            ## OpenAra ${{ github.ref_name }}

            ### Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/koljaschoepe/OpenAra/${{ github.ref_name }}/install.sh | bash
            ```

            Or manually:
            ```bash
            git clone --branch ${{ github.ref_name }} https://github.com/koljaschoepe/OpenAra.git
            cd OpenAra
            sudo ./setup.sh
            ```

            See [CHANGELOG.md](CHANGELOG.md) for details.
